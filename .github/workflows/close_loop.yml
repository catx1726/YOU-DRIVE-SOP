name: Issue Knowledge Closure

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  comment-on-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Post Knowledge Summary
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            const prBody = pr.body || "";
            const prTitle = pr.title;
            const headRef = pr.head.ref;
            
            // 1. 智能提取 Issue 关联 (支持 #123 或 issue-slug)
            const numericMatch = prBody.match(/(?:Fixes|Closes|Resolves)\s+#(\d+)/i);
            const issueId = numericMatch ? numericMatch[1] : headRef.replace(/^issue-/, '');
            
            // 2. 识别归档路径 (匹配 openspec/changes/archive/ 中的目录)
            // 注意：由于 GitHub Action 的限制，无法直接列出文件，但我们可以生成预测链接
            const archivePath = `openspec/changes/archive/`;
            
            // 3. 提取 Summary (匹配 PR 描述中的 ## Summary 章节)
            const summaryMatch = prBody.match(/## Summary\s*([\s\\S]*?)(?=\\n##|$)/i);
            const summary = summaryMatch ? summaryMatch[1].trim() : "见归档文档。";

            const commentBody = `
              ### ✅ 任务完成与知识沉淀 (SOP 2.0)
              本项目已成功合并！本次协作产生的智力资产已归档。

              - **📚 技术归档**: [查看 openspec/changes/archive/ 目录](https://github.com/${context.repo.owner}/${context.repo.repo}/tree/main/${archivePath})
              - **🛠 核心变更摘要**:
              ${summary}

              ---
              *Generated by YOU-DRIVE-SOP Engine (GitHub Actions)*
              `;

            // 4. 发表评论 (优先对数字 Issue 发表，如果是描述性 ID 则记录在 PR)
            if (numericMatch) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(issueId),
                body: commentBody.replace(/^\s+/gm, '')
              });
            } else {
              console.log(`描述性 ID [${issueId}]，评论已由 PR Summary Action 处理。`);
            }
