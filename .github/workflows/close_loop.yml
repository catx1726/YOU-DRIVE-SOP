name: Issue Knowledge Closure

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  comment-on-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Post Knowledge Summary
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            const prBody = pr.body || "";
            const headRef = pr.head.ref;
            
            // 1. 智能提取 Issue 关联 (支持 #123 或 issue-slug)
            const numericMatch = prBody.match(/(?:Fixes|Closes|Resolves)\s+#(\d+)/i);
            const issueId = numericMatch ? numericMatch[1] : headRef.replace(/^issue-/, '');
            
            // 2. 识别归档路径 (匹配 docs/superpowers/ 中的目录)
            const archivePath = `docs/superpowers/`;
            
            // 3. 提取 Summary (匹配 PR 描述中的 ## 🚀 变更摘要 (Summary) 章节)
            const summaryMatch = prBody.match(/## 🚀 变更摘要 \(Summary\)\s*([\s\\S]*?)(?=\\n##|$)/i);
            const summary = summaryMatch ? summaryMatch[1].trim() : "见归档文档。";

            const commentBody = `
              ### ✅ 任务完成与知识沉淀 (SOP 2.0)
              本项目已成功合并！本次协作产生的智力资产已归档。

              - **📚 技术归档**: [查看 docs/superpowers/ 目录](https://github.com/${context.repo.owner}/${context.repo.repo}/tree/main/${archivePath})
              - **🛠 核心变更摘要**:
              ${summary}

              ---
              *Generated by YOU-DRIVE-SOP Engine (GitHub Actions)*
              `;

            // 4. 发表评论
            if (numericMatch) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(issueId),
                body: commentBody.replace(/^\s+/gm, '')
              });
            } else {
              console.log(`描述性 ID [${issueId}]，评论已由 PR Summary Action 处理。`);
            }

  update-changelog:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG.md
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const prBody = pr.body || "";
            const prTitle = pr.title;
            const prNumber = pr.number;
            const date = new Date().toISOString().split('T')[0];
            
            // 1. 提取 Summary
            const summaryMatch = prBody.match(/## 🚀 变更摘要 \(Summary\)\s*([\s\\S]*?)(?=\\n##|$)/i);
            const summary = summaryMatch ? summaryMatch[1].trim() : prTitle;

            // 2. 构造 Changelog 条目
            const newEntry = `\n### [${date}] ${prTitle} (#${prNumber})\n${summary}\n`;

            // 3. 读取并更新文件
            let content = fs.readFileSync('CHANGELOG.md', 'utf8');
            const unreleasedTag = '# Unreleased';
            
            if (content.includes(unreleasedTag)) {
              content = content.replace(unreleasedTag, `${unreleasedTag}\n${newEntry}`);
            } else {
              content = `# Unreleased\n${newEntry}\n${content}`;
            }

            fs.writeFileSync('CHANGELOG.md', content);

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: auto-update CHANGELOG.md for PR #${{ github.event.pull_request.number }}" || echo "No changes to commit"
          git push origin main
