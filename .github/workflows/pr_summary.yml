name: AI PR Summary & Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  summary_and_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 确保获取完整历史，以便 git diff 能找到基准分支
          fetch-depth: 0

      - name: Generate AI Summary
        id: summary
        run: |
          # 1. 确保对比基准存在
          git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}
          
          # 2. 初始化 Summary 内容
          echo "### 🤖 AI 代码变更自检" > summary.md
          echo "#### 1. 变更统计 (Stat)" >> summary.md
          echo "\`\`\`text" >> summary.md
          git diff origin/${{ github.base_ref }}...HEAD --stat >> summary.md
          echo "\`\`\`" >> summary.md
          
          echo -e "\n#### 2. 关键文件变更清单" >> summary.md
          # 排除非业务逻辑目录，保留 src 下的核心逻辑
          FILES=$(git diff origin/${{ github.base_ref }}...HEAD --name-only | grep -vE '^(\.ai/|\.github/|package\.json|pnpm-lock\.yaml|README\.md)' || true)
          
          if [ -z "$FILES" ]; then
            echo "_无核心逻辑文件变更_" >> summary.md
          else
            # 逐行格式化为 Markdown 列表
            echo "$FILES" | while read -r line; do echo "- \`$line\`"; done >> summary.md
          fi
          
          echo -e "\n#### 3. SOP 合规性检查" >> summary.md
          # 1. 提取当前 PR 分支名或标题中的 Issue 编号 (假设格式为 feat/issue-123)
          ISSUE_NUM=$(echo "${{ github.head_ref }}" | grep -oE '[0-9]+' | head -1 || true)
          
          # 2. 检查 .ai/archive/ 下是否有对应编号的总结文件
          ARCHIVE_CHANGES=$(git diff origin/${{ github.base_ref }}...HEAD --name-only | grep ".ai/archive/.*${ISSUE_NUM}_summary.md" || true)
          
          if [ -z "$ISSUE_NUM" ]; then
            echo "⚠️ **警告**：无法从分支名提取 Issue 编号，请手动确认归档。" >> summary.md
          elif [ -z "$ARCHIVE_CHANGES" ]; then
            echo "❌ **异常**：未检测到 \`.ai/archive/${ISSUE_NUM}_summary.md\`。请按 SOP 提交归档文档。" >> summary.md
            echo "CHECK_STATUS=fail" >> $GITHUB_ENV
          else
            echo "✅ **合规**：已检测到 Issue #${ISSUE_NUM} 的归档文档。" >> summary.md
            echo "CHECK_STATUS=pass" >> $GITHUB_ENV
          fi

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: summary.md
          comment_tag: ai_summary_guard

      - name: Final Check Guard
        if: env.CHECK_STATUS == 'fail'
        run: |
          echo "SOP check failed: Missing archive documentation."
          exit 1
