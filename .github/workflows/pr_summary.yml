name: AI PR Summary & Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  summary_and_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 确保获取完整历史，以便 git diff 能找到基准分支
          fetch-depth: 0

      - name: Generate AI Summary
        id: summary
        run: |
          # 1. 确保对比基准存在
          git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}
          
          # 2. 初始化 Summary 内容
          echo "### 🤖 AI 代码变更自检" > summary.md
          echo "#### 1. 变更统计 (Stat)" >> summary.md
          echo "\`\`\`text" >> summary.md
          git diff origin/${{ github.base_ref }}...HEAD --stat >> summary.md
          echo "\`\`\`" >> summary.md
          
          echo -e "\n#### 2. 关键文件变更清单" >> summary.md
          # 排除非业务逻辑目录，保留 src 下的核心逻辑
          FILES=$(git diff origin/${{ github.base_ref }}...HEAD --name-only | grep -vE '^(\.ai/|\.github/|package\.json|pnpm-lock\.yaml|README\.md)' || true)
          
          if [ -z "$FILES" ]; then
            echo "_无核心逻辑文件变更_" >> summary.md
          else
            # 逐行格式化为 Markdown 列表
            echo "$FILES" | while read -r line; do echo "- \`$line\`"; done >> summary.md
          fi
          
          echo -e "\n#### 3. SOP 合规性检查" >> summary.md
          # 1. 尝试从分支名提取 Issue ID
          # 策略：优先提取 issue- 后面的完整 slug，如果不存在则提取数字
          HEAD_REF="${{ github.head_ref }}"
          ISSUE_ID=$(echo "$HEAD_REF" | sed -E 's/^issue-//' || true)
          NUMERIC_ID=$(echo "$HEAD_REF" | grep -oE '[0-9]+' | head -1 || true)
          
          # 2. 检查 openspec/changes/archive/ 下是否有对应名称的归档文件夹 (支持 YYYY-MM-DD-ID 格式)
          # 搜索模式：包含 ISSUE_ID 或 NUMERIC_ID 的目录
          ARCHIVE_MATCH=$(find openspec/changes/archive/ -maxdepth 1 -name "*${ISSUE_ID}*" -o -name "*${NUMERIC_ID}*" | head -1 || true)
          
          if [ -z "$ISSUE_ID" ]; then
            echo "⚠️ **警告**：无法识别有效的 Issue ID，请手动确认归档。" >> summary.md
          elif [ -z "$ARCHIVE_MATCH" ]; then
            echo "❌ **异常**：未在 \`openspec/changes/archive/\` 下检测到匹配 \`${ISSUE_ID}\` 的归档。请执行 \`/opsx:archive\`。" >> summary.md
            echo "CHECK_STATUS=fail" >> $GITHUB_ENV
          else
            ARCHIVE_NAME=$(basename "$ARCHIVE_MATCH")
            echo "✅ **合规**：已检测到归档目录 \`$ARCHIVE_NAME\`。" >> summary.md
            echo "CHECK_STATUS=pass" >> $GITHUB_ENV
          fi

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: summary.md
          comment_tag: ai_summary_guard

      - name: Final Check Guard
        if: env.CHECK_STATUS == 'fail'
        run: |
          echo "SOP check failed: Missing archive documentation."
          exit 1
