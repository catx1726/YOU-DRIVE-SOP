name: AI Code Review Assistant

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Review Summary
        id: review
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "### 🤖 AI 代码审查报告" > review.md
          echo "" >> review.md

          # 1. 变更统计
          echo "#### 📊 变更统计" >> review.md
          echo "\`\`\`text" >> review.md
          git diff origin/${{ github.base_ref }}...HEAD --stat >> review.md
          echo "\`\`\`" >> review.md
          echo "" >> review.md

          # 2. 核心逻辑变更
          echo "#### 🔍 核心变更分析" >> review.md
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -vE '^(docs/|\.github/|\.gemini/|test/|tests/)' || true)
          
          if [ -z "$FILES" ]; then
            echo "_本次 PR 无核心逻辑变更_" >> review.md
          else
            echo "| 文件 | 类型 | 风险等级 |" >> review.md
            echo "|------|------|----------|" >> review.md
            
            while IFS= read -r file; do
              # 简单风险评估
              RISK="🟢 Low"
              if [[ $file == *"config"* ]] || [[ $file == *"service"* ]]; then
                RISK="🟡 Medium"
              fi
              if [[ $file == *"auth"* ]] || [[ $file == *"security"* ]] || [[ $file == *"crypto"* ]]; then
                RISK="🔴 High"
              fi
              
              # 判断文件类型
              EXT="${file##*.}"
              case "$EXT" in
                js) TYPE="JavaScript" ;;
                ts) TYPE="TypeScript" ;;
                md) TYPE="Documentation" ;;
                yml|yaml) TYPE="Configuration" ;;
                json) TYPE="Data/Config" ;;
                *) TYPE="Other" ;;
              esac
              
              echo "| \`$file\` | $TYPE | $RISK |" >> review.md
            done <<< "$FILES"
          fi
          echo "" >> review.md

          # 3. 测试覆盖检查
          echo "#### 🧪 测试覆盖" >> review.md
          TEST_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '(test/|tests/|\.test\.|\.spec\.)' || true)
          if [ -n "$TEST_FILES" ]; then
            echo "✅ 检测到测试文件变更：" >> review.md
            echo "$TEST_FILES" | while read -r f; do echo "- \`$f\`"; done >> review.md
          else
            CODE_CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -vE '^(docs/|\.github/|\.gemini/|test/|tests/)' || true)
            if [ -n "$CODE_CHANGES" ]; then
              echo "⚠️ 代码变更但无测试文件更新，建议补充测试" >> review.md
            else
              echo "_无代码变更_" >> review.md
            fi
          fi
          echo "" >> review.md

          # 4. SOP 合规检查
          echo "#### 📋 SOP 合规" >> review.md
          
          ISSUE_MATCH=$(echo "$PR_BODY" | grep -oE '(?:Closes|Fixes|Resolves) #([0-9]+)' | head -1 | grep -oE '[0-9]+' || true)
          BRANCH_NAME="${{ github.head_ref }}"
          ISSUE_ID="${ISSUE_MATCH:-$(echo "$BRANCH_NAME" | sed -E 's/^issue-//' | grep -oE '^[0-9]+' || echo '')}"

          if [ -z "$ISSUE_ID" ]; then
            echo "⚠️ 无法识别关联 Issue" >> review.md
          else
            echo "✅ 关联 Issue: #${ISSUE_ID}" >> review.md
            
            # 检查审计日志
            HAS_CHANGELOG=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.gemini/ops_changelog\.md' || true)
            if [ -n "$HAS_CHANGELOG" ]; then
              echo "✅ 审计日志已更新" >> review.md
            else
              echo "⚠️ 建议更新 .gemini/ops_changelog.md" >> review.md
            fi
          fi

          echo "" >> review.md
          echo "---" >> review.md
          echo "*Generated by AI Review Assistant*" >> review.md

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: review.md
          comment_tag: ai_code_review
