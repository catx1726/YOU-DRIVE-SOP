schema: spec-driven

# Runtime environment for sub-repos
runtime:
  # AI MUST scan project-specific config files (e.g., package.json, build.gradle, Cargo.toml)
  # to determine the correct test and lint commands for the specific project.
  # The defaults below are placeholders and should be overridden.
  test_command: "npm test" # Default for frontend; AI MUST scan and update this per project
  lint_command: "npm run lint" # Default for frontend; AI MUST scan and update this per project

# Project context (High-density SOP 2.0 alignment)
context: | # Aligns with the "Four-Layer Governance" framework detailed in SOP_CORE_MANUAL.md
  This project follows the YOU-DRIVE-SOP framework.
  - Test Entry: Execute '{{TEST_COMMAND}}' before any manual verification, adhering to TDD and debugging protocols from ARCHITECTURE.md and SOP_CORE_MANUAL.md.
  - Security Mandate: All modifications through 'meta-safe-executor'.


# Per-artifact rules
rules:
  tasks:
    - Each implementation task MUST include a 'Validation' step.
    - Reference the 'meta-safe-executor' skill for any destructive operations.
    - "Integrity Check: Every task list MUST start with '## 1. 规约与环境自检 (Mandatory Setup)' including branch check and audit logs. This strict structure is mandated by the 'Step-before-read' and 'Audit-First' protocols in SOP_CORE_MANUAL.md."
    - "Integrity Check: Every task list MUST end with 'Process Compliance Verification' (Logs, Language, PR)."
  proposal:
    - Automatically create a GitHub Issue if none exists, or link to current issue.
    - "Automation: 'git checkout -b issue-N' MUST be done before implementation. This adheres to branch isolation rules defined in ARCHITECTURE.md."
  archive:
    - Closure: Automatically generate PR description and link to archived assets.
    - Decision: Mandatory creation of ADR in 'openspec/decisions/' during archive.

# Task templates (Injecting guardrails into the process)
templates:
  tasks: |
    ## 1. 规约与环境自检 (Mandatory Setup)

    - [ ] 1.1 确认当前分支为 `issue-N` 或 `task/N` 分支（禁止在 main 直接操作）
    - [ ] 1.2 确认已在 `.gemini/ops_changelog.md` 记录本次操作表格
    - [ ] 1.3 执行 `activate_skill verification-before-completion` 预载验证逻辑

    ## 2. 核心实施 (Core Implementation)

    - [ ] 2.1 <!-- Task description -->
    - [ ] 2.2 <!-- Task description -->

    ## 3. 过程合规性校验 (Compliance Verification)

    - [ ] 3.1 确认所有写操作均有审计记录
    - [ ] 3.2 确认 PR 描述已准备就绪

# Skill Linkage (Ensuring sub-repo accessibility)
skills:
  safety: .gemini/skills/meta-safe-executor/SKILL.md
  distiller: .gemini/skills/meta-distiller/SKILL.md
  debugging: .gemini/skills/systematic-debugging/SKILL.md
  # Domain skills are linked dynamically during workshop-initializing
